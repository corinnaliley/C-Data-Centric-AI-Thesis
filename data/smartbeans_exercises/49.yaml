shortname: "Mittelwert" #S8
title: "Mittelwert von Gleitkommazahlen berechnen"
taskid: 49
defaultEditorInput: |
lang: "c"
task: |
  Schreiben Sie ein Programm, das eine beliebige Anzahl von Gleitkommazahlen (`float`!) einliest und ihren Mittelwert ausgibt. Die Zahlen müssen dazu nicht alle gleichzeitig gespeichert werden, sondern können nacheinander eingelesen und bearbeitet werden.
  
  ### Beispieleingabe
  ```
  3 4 4 5.5
  ```
  ### Beispielausgabe
  ```
  4.125000
  ```
solution: |
  #include<stdio.h>
  int main() {
    float number;
    int n = 0;
    float sum = 0;
    while(scanf("%f", &number) == 1) {
      sum += number;
      n++;
    }
    printf("%f", n==0 ? 0 : sum/n);
  }
tests:
  - testtype: "c-input-output"
    testCases:
      - args: []
        stdin: |
          1 2 3 4 5 6 7 8 9
        stdout: |
          5.000000
      - args: []
        stdin: |
          9 8 7 6 5 4 3 2 1
        stdout: |
          5.000000
      - args: []
        stdin: |
          0 0 0
        stdout: |
          0.000000
      - args: []
        stdin: |
          1 3 999999
        stdout: |
          333334.343750
      - args: []
        stdin: |
          -1 1
        stdout: |
          0.000000
      - args: []
        stdin: |
          1 3 -999999
        stdout: |
          -333331.656250
