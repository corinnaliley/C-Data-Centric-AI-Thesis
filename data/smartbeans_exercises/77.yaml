shortname: "Sudoku überprüfen" #E23
title: "Überprüfen ob Matrix gültiges Sudoku ist"
taskid: 77
defaultEditorInput: |
lang: "c"
task: |
  Eine Sudoku-Matrix ist eine 9x9-Matrix, deren Einträge ganze Zahlen zwischen 1 und 9 sind und die weitere Bedingungen erfüllen. Zur Formulierung der Bedingungen betrachten wir die Matrix als Blockmatrix aus 9 Blöcken von 3x3-Matrizen, die durch die Zeilen bzw. Spalten 1 bis 3, 4 bis 6 und 7 bis 9 gebildet werden. Jede dieser 3x3-Matrizen bezeichnen im Weiteren als Block. Nun können wir die Bedingungen formulieren, die aus einer Matrix obiger Form eine Sudoku-Matrix machen: 
  - Jede Zeile und jede Spalte gibt eine Permutation der Länge 9 an.
  - Jeder Block enthält jeden der Werte 1 bis 9 genau einmal.

  ---
  Programmieren Sie eine Funktion 
  ```
  int sudokucheck(const int** s)
  ``` 
  die von einer 9x9 Matrix in Doppelzeigerform (siehe Aufgabe Permutationsmatrix) prüft, ob es sich dabei um eine Sudoku-Matrix handelt. Geben Sie `1` zurück, falls ja, und `0` sonst.
solution: |
  #include <stdio.h>

  int sudokucheck(const int** s) {
    const int laenge = 9;
    
    for(int i = 0; i < laenge; i++) {
      int helper[] = {2,2,2,2,2,2,2,2,2};
      for(int j = 0; j < laenge; j++) {
        if(*(*s + (i*laenge) + j) < 1 || *(*s + (i*laenge) + j) > 9) {
          return 0;
        }
        if(helper[(*(*s + (i*laenge) + j) - 1)]) {
          helper[(*(*s + (i*laenge) + j) - 1)]--;
        }
        else {
          return 0;
        }
        if(helper[(*(*s + (j*laenge) + i) - 1)]) {
          helper[(*(*s + (j*laenge) + i) - 1)]--;
        }
        else {
          return 0;
        }
        if(!(i % 3) && !(j % 3)) {
          int block[] = {1,1,1,1,1,1,1,1,1};
          for(int k = 0; k < 3; k++) {
            for(int l = 0; l < 3; l++) {
              if(block[(*(*s + (i*laenge) + j + (k*laenge) + l) - 1)]) {
                block[(*(*s + (i*laenge) + j + (k*laenge) + l) - 1)]--;
              }
              else {
                return 0;
              }
            }
          }			
        }
      }
    }
    return 1;
  }
