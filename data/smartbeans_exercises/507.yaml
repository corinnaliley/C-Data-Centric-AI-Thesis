shortname: "Quersumme" #N7
title: "Quersumme berechnen"
taskid: 507
defaultEditorInput: |
solution: |
  #include <stdio.h>
   
  int main() {
    int n;
    scanf("%d", &n);
 
    int sum = 0;
    while (n > 0 ) {
      sum += n % 10;
      n /= 10;
    }
    
    printf("%d\n", sum);
 
    return 0;
  }
lang: "c"
task: |
  Die Quersumme einer Zahl ist die Summe der einzelnen Ziffern. Schreiben Sie ein Programm, das eine Zahl > 0 einliest und deren Quersumme ausgibt.
 
  ### Beispieleingabe
  ```
  18
  21449
  8
  ```
  ### Beispielausgabe
  ```
  9
  20
  8
  ```
