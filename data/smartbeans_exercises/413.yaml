            CU_PASS("Erfolg! Eingabe (7, 40) Erwartete Ausgabe (13)");
          } else {
            printf("\n    2.Test: Fehler!\n\
                    Eingabe:              (7, 40)\n\
                    Erwartete Ausgabe:    (13)\n\
                    Tatsächliche Ausgabe: (%d)\n", eimer(7, 40));
            CU_FAIL("2.Test");
          }
          // Kommazahl 1
          if (eimer(4.5, 36) == 14) {
            CU_PASS("Erfolg! Eingabe (4.5, 36) Erwartete Ausgabe (14)");
          } else {
            printf("\n    3.Test: Fehler!\n\
                    Eingabe:              (4.5, 36)\n\
                    Erwartete Ausgabe:    (14)\n\
                    Tatsächliche Ausgabe: (%d)\n", eimer(4.5, 36));
