            printf("\n    1.Test: Fehler!\n\
                    Eingabe:              (7, 25)\n\
                    Erwartete Ausgabe:    (23)\n\
                    Tatsächliche Ausgabe: (%d)\n", eimer(7, 25));
            CU_FAIL("1.Test");
          }
          // Beispiel Variante
