            CU_PASS("Erfolg! Eingabe (7.6, 23) Erwartete Ausgabe (26)");
          } else {
            printf("\n    7.Test: Fehler!\n\
                    Eingabe:              (7.6, 23)\n\
                    Erwartete Ausgabe:    (26)\n\
                    Tatsächliche Ausgabe: (%d)\n", eimer(7.6, 23));
            CU_FAIL("7.Test");
          }
        }

