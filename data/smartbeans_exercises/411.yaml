        void test_frequency(void){ 
          int result;
      
          //Testcase Beispiel
          const char bsp[] = "Test!";
          result = frequency(bsp, 'T');
          
          if(result == 2){
            CU_PASS("Erfolg!");
          }
          else{
            printf("\n    1.Test: Fehler!\n\
                    Eingabe:              (\"Test!\", 'T')\n\
                    Erwartete Ausgabe:    (2)\n\
                    Tatsächliche Ausgabe: (%d)\n", result );
            CU_FAIL("1.Test");
