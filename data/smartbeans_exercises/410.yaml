shortname: "Buchstaben ersetzen" #D10
title: "Buchstaben in einem String ersetzen"
taskid: 410
defaultEditorInput: |
solution: |
  #include <string.h>
   
  int exchange(char* s, char a, char b){
    int len = strlen(s);
    int count = 0;
    for(int i = 0; i < len; i++){
      if(s[i] == a){
        s[i] = b;
        count++;
      }
    }
    return count;
  }
lang: "c"
task: |
  Schreiben Sie eine Funktion 

  ```
  int exchange(char* s, char a, char b)
  ```
  
  die im String `s` alle Vorkommen von `a` durch `b` ersetzt. Die Funktion gibt die Anzahl der vorgenommenen Ersetzungen zurück.
   
  *Anforderungen*
   
  - Nach Ausführung der Funktion soll im String `s` der veränderte String gespeichert sein.
  - Die Funktion berücksichtigt Groß- und Kleinschreibung.
   
  ### Beispielaufruf
  ```
  char s[] = "anna";
  int n = exchange(s, 'a', 'o');
  ```
   
  ### Beispielergebnis
  ```
  s : "onno"
  n : 2
  ```
tests: 
  - testtype: "c-code"
    testCases: 
