        #include <CUnit/CUnit.h>
        #include "CUnit/Basic.h"
        #include "solution.c"
        #include <string.h>
         
        void test_exchange(void){ 
          int count;
        
          //Testcase Beispiel
          char t1[] = "anna";
          count = exchange(t1, 'a', 'o');
          if(strcmp(t1, "onno") == 0 && count == 2){
            CU_PASS("Erfolg! Eingabe (anna, a, o) Erwartetes Ergebnis (onno, 2)");
          }
          else{
            printf("\n    1.Test: Fehler!\n\
                    Eingabe:              (anna, a, o)\n\
                    Erwartete Ausgabe:    (onno, 2)\n\
                    Tatsächliche Ausgabe: (%s, %d)\n",t1 ,count );
            CU_FAIL("1.Test");
          }
         
          //Testcase viele Buchstaben
          char t2[] = "ananassalat";
          count = exchange(t2, 'a', 'e');
          if(strcmp(t2, "enenesselet") == 0 && count == 5){
            CU_PASS("Erfolg! Eingabe (ananassalat, a, e) Erwartetes Ergebnis (enenesselet, 5)");
          }
          else{
            printf("\n    2.Test: Fehler!\n\
                    Eingabe:              (ananassalat, a, e)\n\
                    Erwartete Ausgabe:    (enenesselet, 5)\n\
                    Tatsächliche Ausgabe: (%s, %d)\n",t2 ,count );
            CU_FAIL("2.Test");
          }
        
          //Testcase kein Buchstabe
          char t3[] = "dd";
          count = exchange(t3, 'a', 'y');
          if(strcmp(t3, "dd") == 0 && count == 0){
            CU_PASS("Erfolg! Eingabe (dd, a, y) Erwartetes Ergebnis (dd, 0)");
          }
          else{
            printf("\n    3.Test: Fehler!\n\
                    Eingabe:              (dd, a, y)\n\
                    Erwartete Ausgabe:    (dd, 0)\n\
                    Tatsächliche Ausgabe: (%s, %d)\n",t3 ,count );
            CU_FAIL("3.Test");
          }
        
          //Testcase meherere Worte, Sonderzeichen
          char t4[] = "Hallo Welt!";
          count = exchange(t4, 'a', 'e');
          if(strcmp(t4, "Hello Welt!") == 0 && count == 1){
            CU_PASS("Erfolg! Eingabe (Hallo Welt!, a, e) Erwartetes Ergebnis (Hello Welt!, 1)");
          }
          else{
            printf("\n    4.Test: Fehler!\n\
                    Eingabe:              (Hallo Welt!, a, e)\n\
                    Erwartete Ausgabe:    (Hello Welt!, 1)\n\
                    Tatsächliche Ausgabe: (%s, %d)\n",t4 ,count );
            CU_FAIL("4.Test");
          }
            
          //Testcase Groß- und Kleinschreibung
          char t5[] = "Otto";
          count = exchange(t5, 'O', 'l');
          if(strcmp(t5, "ltto") == 0 && count == 1){
            CU_PASS("Erfolg! Eingabe (Otto, O, l) Erwartetes Ergebnis (ltto, 1)");
          }
          else{
            printf("\n    5.Test: Fehler!\n\
                    Eingabe:              (Otto, O, l)\n\
                    Erwartete Ausgabe:    (ltto, 1)\n\
                    Tatsächliche Ausgabe: (%s, %d)\n",t5 ,count );
            CU_FAIL("5.Test");
          } 
            
          //Testcase leerer String
          char t6[] = "";
          count = exchange(t6, 'x', 'y');
          if(strcmp(t6, "") == 0 && count == 0){
            CU_PASS("Erfolg! Eingabe ( , x, y) Erwartetes Ergebnis ( , 0)");
          }
          else{
            printf("\n    6.Test: Fehler!\n\
                    Eingabe:              (\"\" , x, y)\n\
                    Erwartete Ausgabe:    (\"\" , 0)\n\
                    Tatsächliche Ausgabe: (\"%s\", %d)\n",t6 ,count );
            CU_FAIL("6.Test");
          }
             
          //Testcase random
          char t7[] = "6n930FHpzD";
          count = exchange(t7, 'F', 'j');
          if(strcmp(t7, "6n930jHpzD") == 0 && count == 1){
            CU_PASS("Erfolg! Eingabe (6n930FHpzD, F, j) Erwartetes Ergebnis (6n930jHpzD, 1)");
          }
          else{
            printf("\n    7.Test: Fehler!\n\
                    Eingabe:              (6n930FHpzD, F, j)\n\
                    Erwartete Ausgabe:    (6n930jHpzD, 1)\n\
                    Tatsächliche Ausgabe: (%s, %d)\n",t7 ,count );
            CU_FAIL("7.Test");
          }
        }
         
