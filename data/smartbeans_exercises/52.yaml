shortname: "Binärzahlen" #S11
title: "Binärzahlen in Dezimalzahlen umwandeln"
taskid: 52
defaultEditorInput: |
lang: "c"
task: |
  Schreiben Sie ein Programm, das eine Binärzahl einliest und den entsprechenden Dezimalwert ausgibt. Dabei sollen führende *whitespaces* überlesen und fehlerhafte Eingaben mit der Ausgabe "Error" zurückgewiesen werden (z.B. Eingabe von Buchstaben oder Überschreitung des Wertebereichs).

  ### Beispieleingabe
  ```
  101101
  ```
  ### Beispielausgabe
  ```
  45
  ```
solution: |
  #include <stdio.h>
  #include <string.h>

  int main(int argc, char *argv[]) {
    int binary;
    int sum = 0;
    int tmp = 0;
    int counter = 0;
    int potenz = 1;
    scanf("%d", &binary);
    while (binary > 0) {
      tmp = binary % 10;
      sum += (tmp * potenz);
      binary /= 10;
      potenz *= 2;
    }
    printf("%d\n", sum);
    return 0;
  }
