shortname: "String Säuberung" #K1
title: "Zeichen aus einem String herausfiltern"
taskid: 82
defaultEditorInput: |
lang: "c"
task: |
  Programmieren Sie eine Funktion zum Säubern von Strings mit folgendem Prototyp: 
  ```
  int strclean(char *t)
  ```
  
  *Anforderungen*
  
  - Die Leerzeichen und die nicht druckbare Zeichen wurden aus dem übergebenen String entfernt
  - Wenn ein Fehler aufgetreten ist (z.B. wenn `t` der Null-Zeiger ist) wird ein negativer Wert zurückgeliefert, ansonsten wird die Anzahl der aus dem String entfernten Zeichen zurückgeliefert.
  - Benutzen Sie zur Erkennung von Leerzeichen und nicht druckbaren Zeichen Funktionen der Standardbibliothek.
  
  *Hinweise*
  
  - Der übergebenen String wird u.U. kürzer, d.h. die Funktion muss sowohl die Stelle im String von der ein Zeichen gelesen wird, als auch die Stelle an die ein Zeichen geschrieben wird, kennen.
  - Vergessen Sie nicht den String mit dem Null-Zeichen abzuschließen.
  
  ---
  
  *Lösen - Testen - Abgeben*
  - Zum Testen ihrer Lösung laden Sie die Datei `a01-testing.c`  <a target="_blank" rel="noopener noreferrer" href="https://owncloud.gwdg.de/index.php/s/UOXlb9P4CBcLIry">**hier**</a> herunter.
  - Kompilieren Sie den Testcode. `gcc -c -Wall -std=c11 a01-testing.c`. 
  - Schreiben Sie ihre eigene Lösungsdatei z.B. `a01.c`.
  - Kompilieren Sie Ihre Lösung `gcc -c -Wall -std=c11 a01.c`.
  - Binden Sie die Objectcode-Dateien Ihrer Lösung und des Testcodes zu einem ausführbaren Programm. `gcc -o a01 a01.o a01-testing.o`.
  - Testen Sie Ihre Lösung, dafür können Sie den Testcode bliebig anpassen.
  - Zum Abgeben der Lösung laden Sie nur die von Ihnen erstellte Datei, z.B. `a01.c` hoch.

solution: |
  #include<ctype.h>
  int strclean(char *t) {
    if (t == NULL) {
      return -1;
    }

    char *tmp = t;
    int count = 0;

    while(*t) {
      if (!isgraph(*t)) {
        count++;
      } else {
        *tmp = *t;
        tmp++;
      }
      t++;
    }
    *tmp = '\0';
    return count;
  }
