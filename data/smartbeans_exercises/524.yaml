        #include <CUnit/CUnit.h>
        #include "CUnit/Basic.h"
        #include <stdlib.h>
        
        typedef struct {
          int zaehler;
          int nenner;
        } bruch_t;

        bruch_t sub_rational(bruch_t *x, bruch_t *y) {
          bruch_t result;
          int nenner_neu = x->nenner * y->nenner;
          int x_zaehler_neu = y->nenner * x->zaehler;
          int y_zaehler_neu = x->nenner * y->zaehler;
          result.zaehler = x_zaehler_neu - y_zaehler_neu;
          result.nenner = nenner_neu;
          if (result.nenner < 0) {
            result.nenner *= -1;
            result.zaehler *= -1;
          }
          return result;
        } 

