        #include <string.h>
        
        void test_static_malloc_str(void){ 
          
          //  == Beispiel == 
          
          char* bsp1 = static_str("Möglichkeit 1");
          if(strcmp(bsp1, "Möglichkeit 1") == 0){
            CU_PASS("Erfolg (static_str)! Eingabe (Möglichkeit 1) Erwartete Rückgabe (Möglichkeit 1)");
          }
          else{
            printf("\n    1.Test: Fehler!\n\
                    Eingabe:              (static_str(\"Möglichkeit 1\"))\n\
                    Erwartete Ausgabe:    (\"Möglichkeit 1\")\n\
                    Tatsächliche Ausgabe: (\"%s\")\n",bsp1);
            CU_FAIL("1.Test");
          }
            
          char bsp2[] = "Möglichkeit 2 (schöner)";
          char* bsp2ptr = malloc_str(bsp2, 24);
          if(strcmp(bsp2ptr, "Möglichkeit 2 (schöner)") == 0){
            CU_PASS("Erfolg (malloc_str)! Eingabe (Möglichkeit 2 (schöner)) Erwartete Rückgabe (Möglichkeit 2 (schöner))");
          }
          else{
            printf("\n    2.Test: Fehler!\n\
                    Eingabe:              (malloc_str(\"Möglichkeit 2 (schöner)\"))\n\
                    Erwartete Ausgabe:    (\"Möglichkeit 2 (schöner)\")\n\
                    Tatsächliche Ausgabe: (\"%s\")\n",bsp2ptr);
            CU_FAIL("2.Test");
          }
          
          //  == Leerer String ==
          
          char* empty1 = static_str("");
          if(strcmp(empty1, "") == 0){
            CU_PASS("Erfolg (static_str)! Eingabe () Erwartete Rückgabe ()");
          }
          else{
            printf("\n    3.Test: Fehler!\n\
                    Eingabe:              (static_str(\"\"))\n\
                    Erwartete Ausgabe:    (\"\")\n\
                    Tatsächliche Ausgabe: (\"%s\")\n",empty1);
            CU_FAIL("3.Test");
          }
            
          char empty2[] = "";
          char* empty2ptr = malloc_str(empty2, 0);
          if(strcmp(empty2ptr, "") == 0){
            CU_PASS("Erfolg (malloc_str)! Eingabe () Erwartete Rückgabe ()");
          }
          else{
            printf("\n    4.Test: Fehler!\n\
                    Eingabe:              (malloc_str(\"\"))\n\
                    Erwartete Ausgabe:    (\"\")\n\
                    Tatsächliche Ausgabe: (\"%s\")\n",empty2ptr);
            CU_FAIL("4.Test");
          }
        
          //  == Random ==
          
          char* r1 = static_str("iTnRabZZaK");
          if(strcmp(r1, "iTnRabZZaK") == 0){
            CU_PASS("Erfolg (static_str)! Eingabe (iTnRabZZaK) Erwartete Rückgabe (iTnRabZZaK)");
          }
          else{
            printf("\n    5.Test: Fehler!\n\
                    Eingabe:              (static_str(\"iTnRabZZaK\"))\n\
                    Erwartete Ausgabe:    (\"iTnRabZZaK\")\n\
                    Tatsächliche Ausgabe: (\"%s\")\n",r1);
            CU_FAIL("5.Test");
          }
            
          char r2[] = "iTnRabZZaK";
          char* r2ptr = malloc_str(r2, 11);
          if(strcmp(r2ptr, "iTnRabZZaK") == 0){
            CU_PASS("Erfolg (malloc_str)! Eingabe (iTnRabZZaK) Erwartete Rückgabe (iTnRabZZaK)");
          }
          else{
            printf("\n    6.Test: Fehler!\n\
                    Eingabe:              (malloc_str(\"iTnRabZZaK\"))\n\
                    Erwartete Ausgabe:    (\"iTnRabZZaK\")\n\
                    Tatsächliche Ausgabe: (\"%s\")\n",r2ptr);
            CU_FAIL("6.Test");
          }
        }
          
