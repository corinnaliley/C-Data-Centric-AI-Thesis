        #include <CUnit/CUnit.h>
        #include "CUnit/Basic.h"
        #include "solution.c"

        void showFailMessage(int test_num, int input1, long exp, long act){
          printf("\n    %d.Test: Fehler!\n\
                    Eingabe:              (%d)\n\
                    Erwartete Ausgabe:    (%ld)\n\
                    Tatsächliche Ausgabe: (%ld)\n", test_num, input1, exp, act);
        }
        void test_quadrat(void){
          if(f(0) == 2){
            CU_PASS("Erfolg!");
          } else {
            CU_FAIL("1.Test");
            showFailMessage(1, 0, 2, f(0));
          }

          if(f(1) == 16){
            CU_PASS("Erfolg!");
          } else {
            CU_FAIL("2.Test");
            showFailMessage(2, 1, 16, f(1));
          }

          if(f(-1) == -10){
            CU_PASS("Erfolg!");
          } else {
            CU_FAIL("3.Test");
            showFailMessage(3, -1, -10, f(-1));
          }

          if(f(5) == 932){
            CU_PASS("Erfolg!");
          } else {
            CU_FAIL("4.Test");
            showFailMessage(4, 5, 932, f(5));
          }

          if(f(-7) == -2392){
            CU_PASS("Erfolg!");
          } else {
            CU_FAIL("5.Test");
            showFailMessage(5, -7, -2392, f(-7));
          }

          if(f(46573) == 707134480065388){
            CU_PASS("Erfolg!");
          } else {
            CU_FAIL("6.Test");
            showFailMessage(6,46573, 707134480065388, f(46573));
          }
        }
        int init_suite1(void){ return 0; }
        int clean_suite1(void){ return 0; }
        void cleanup(){}

        int main(){
          CU_pSuite pSuite = NULL;

          /* initialize the CUnit test registry */
          if (CUE_SUCCESS != CU_initialize_registry())
            return 1;

          /* add a suite to the registry */
          pSuite = CU_add_suite("Suite_1", init_suite1, clean_suite1);
          if (NULL == pSuite) {
            unsigned int cu_result = CU_get_number_of_failure_records();
            CU_cleanup_registry();
            return cu_result;
          }

          /* add the tests to the suite */
          /* NOTE - ORDER IS IMPORTANT - MUST TEST fread() AFTER fprintf() */
          if ((NULL == CU_add_test(pSuite, "test of mathematical function", test_quadrat)))
          {
            unsigned int cu_result = CU_get_number_of_failure_records();
            CU_cleanup_registry();
            return cu_result;
          }
          /* Run all tests using the CUnit Basic interface */
          CU_basic_set_mode(CU_BRM_VERBOSE);
          CU_basic_run_tests();
          unsigned int cu_result = CU_get_number_of_failure_records();
          CU_cleanup_registry();
          return cu_result;
        }
