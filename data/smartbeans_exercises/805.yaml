solution: |
  long f(long x) {
      return 7*x*x*x + x*x + 6*x + 2;
  }
lang: "c"
task: |
  Schreiben Sie eine Funktion
  ```
  long f(long x)
  ```
  die das Ergebnis der mathematischen Funktion `f(x) = 7x³ + x² + 6x + 2` berechnet und zurúckgibt.
tests: 
