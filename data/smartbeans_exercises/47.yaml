shortname: "Quersumme Variante" #S7
title: "Quersumme iterativ berechnen"
taskid: 47
defaultEditorInput: |
solution: |
  #include<stdio.h>
  
  int main() {
    int n;
    scanf("%d", &n);
    int quersumme = 0;
    while(n>0) {
      quersumme = quersumme + n % 10; // alternativ: quersumme += n%10;
      n = n / 10; // alternativ: n /= 10;
    }
    printf("%d", quersumme);
  }
lang: "c"
task: |
  Schreiben Sie ein Programm, das eine nichtnegative ganze Zahl einliest, ihre Quersumme **iterativ** statt rekursiv berechnet und ausgibt.

  ### Beispieleingabe
  ```
  123
  ```
  ### Beispielausgabe
  ```
  6
  ```
