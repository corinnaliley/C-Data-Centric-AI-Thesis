        #include <CUnit/CUnit.h>
        #include <string.h>
        #include "CUnit/Basic.h"
        #include "solution.c"
        
        void test_simpleTranslate(void){
          translation_t dictionary[11] = {{"Ich", "I"}, {"mag", "like"}, {"Züge", "trains"}, {"Juhu", "Yay"}, {"es", "it"}, {"funktioniert", "works"}, {"Nein", "no"}, {"bin", "am"}, {"eine", "a"}, {"kluge", "smart"}, {"Bohne", "bean"}};
          
          //Testcase "I like trains"
          char teststring1[] = "Ich mag Züge";
          char* trains = simpleTranslate(teststring1, dictionary, 11);
          if(strcmp(trains, "I like trains") == 0){
            CU_PASS("Erfolg! Eingabe (Ich mag Züge) Erwartete Ausgabe (I like trains).");
          }
          else{
            printf("\n    1.Test: Fehler!\n\
                    Eingabe:              (Ich mag Züge)\n\
                    Erwartete Ausgabe:    (I like trains)\n\
                    Tatsächliche Ausgabe: (%s)\n",trains);
            CU_FAIL("1.Test");
          }
          free(trains);
          
          //Testcase "Juhu es funktioniert"
          char teststring2[] = "Juhu es funktioniert";
          char* itworks = simpleTranslate(teststring2, dictionary, 11);
          if(strcmp(itworks, "Yay it works") == 0){
            CU_PASS("Erfolg! Eingabe (Juhu es funktioniert) Erwartete Ausgabe (Yay it works).");
          }
          else{
            printf("\n    2.Test: Fehler!\n\
                    Eingabe:              (Juhu es funktioniert)\n\
                    Erwartete Ausgabe:    (Yay it works)\n\
                    Tatsächliche Ausgabe: (%s)\n",trains);
            CU_FAIL("2.Test");
          }
          free(itworks);
          
          //Testcase "Nein Nein Nein Nein Nein"
          char teststring3[] = "Nein Nein Nein Nein Nein";
          char* no = simpleTranslate(teststring3, dictionary, 11);
          if(strcmp(no, "no no no no no") == 0){
            CU_PASS("Erfolg! Eingabe (Nein Nein Nein Nein Nein) Erwartete Ausgabe (no no no no no).");
          }
          else{
            printf("\n    3.Test: Fehler!\n\
                    Eingabe:              (Nein Nein Nein Nein Nein)\n\
                    Erwartete Ausgabe:    (no no no no no)\n\
                    Tatsächliche Ausgabe: (%s)\n",trains);
            CU_FAIL("3.Test");
          }
          free(no);
          
          //Testcase leerer String
          char teststring4[] = "";
          char* empty = simpleTranslate(teststring4, dictionary, 11);
          if(strcmp(empty, "") == 0){
            CU_PASS("Erfolg! Eingabe () Erwartete Ausgabe ().");
          }
          else{
            printf("\n    4.Test: Fehler!\n\
                    Eingabe:              ()\n\
                    Erwartete Ausgabe:    ()\n\
                    Tatsächliche Ausgabe: (%s)\n",trains);
            CU_FAIL("4.Test");
          }
          free(empty);
          
          //Testcase kluge Bohne
          char teststring5[] = "Ich bin eine kluge Bohne";
          char* bean = simpleTranslate(teststring5, dictionary, 11);
          if(strcmp(bean, "I am a smart bean") == 0){
            CU_PASS("Erfolg! Eingabe (Ich bin eine kluge Bohne) Erwartete Ausgabe (I am a smart bean).");
          }
          else{
            printf("\n    5.Test: Fehler!\n\
                    Eingabe:              (Ich bin eine kluge Bohne)\n\
                    Erwartete Ausgabe:    (I am a smart bean)\n\
                    Tatsächliche Ausgabe: (%s)\n",trains);
            CU_FAIL("5.Test");
          }
          free(bean);
        }
        
          
