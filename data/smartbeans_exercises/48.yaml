shortname: "Trolle" #X1
title: "Zählen wie Trolle"
taskid: 48
defaultEditorInput: |
lang: "c"
task: |
  Trolle zählen auf diese Weise: 1, 2, 3 ... *viele*. Die meisten Leute schließen daraus, daß sie keine größeren Zahlen kennen, doch das ist ein Irrtum. *Viele* kann durchaus für eine Zahl stehen, zum Beispiel: 1, 2, 3, *viele*; *viele*-1, *viele*-2, *viele*-3, *viele* *viele*; *viele*-*viele*-1, *viele*-*viele*-2, *viele*-*viele*-3, *viele*-*viele*-*viele*; *viele*-*viele*-*viele*-1, *viele*-*viele*-*viele*-2, *viele*-*viele*-*viele*-3, ....
  
  Schreiben Sie ein Programm, dass die unter Menschen üblichen Dezimalzahlen einließt und die entsprechende Trollzahl ausgibt. Bedenken Sie dabei, dass Trolle keine 0 kennen.
  <!--Trolle zählen auf diese Weise: eins, zwei, drei ... viele. Die meisten Leute schließen daraus, daß sie keine größeren Zahlen kennen, doch das ist ein Irrtum. Viele kann durchaus für eine Zahl stehen, zum Beispiel: eins, zwei, drei, viele; viele-eins, viele-zwei, viele-drei, viele viele; viele-viele-eins, viele-viele-zwei, viele-viele-drei, viele viele viele; viele-viele-viele-eins, viele-viele-viele-zwei, viele-viele-viele-drei, EINE MENGE.(Helle Barden)-->
  ### Beispieleingabe
  ```
  9
  ```
  ### Beispielausgabe
  ```
  viele-viele-1
  ```

solution: |
  #include<stdio.h>

  int main() {
    int n;
    scanf("%d", &n);
    while(n>=5) {
      printf("viele-");
      n -= 4;
    }
    switch (n) {
      case 4:
        printf("viele\n");
        break;
      default:
        printf("%d\n", n);
        break;
    }
  }
