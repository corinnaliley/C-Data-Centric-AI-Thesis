        #include <CUnit/CUnit.h>
        #include <string.h>
        #include "CUnit/Basic.h"
        #include "solution.c"
        
        void test_recSort(void){
        
          //Testcase Beispiel
          int a[4] = {5, 3, 7, 1};
          int result = recSort(a, a+3, 0);
          if(result == 2){
            CU_PASS("Erfolg! Eingabe (5, 3, 7, 1, reverse = 0) Erwartete Ausgabe (2)");
          }
          else{
            printf("\n    1.Test: Fehler!\n\
                    Eingabe:              (5, 3, 7, 1, reverse = 0)\n\
                    Erwartete Ausgabe:    (2)\n\
                    Tatsächliche Ausgabe: (%d)\n",result);
            CU_FAIL("1.Test");
          }
        
          //Testcase Beispiel umgekehrt
          int b[4] = {5, 3, 7, 1};
          result = recSort(b, b+3, 1);
          if(result == 2){
            CU_PASS("Erfolg! Eingabe (5, 3, 7, 1, reverse = 1) Erwartete Ausgabe (2)");
          }
          else{
            printf("\n    2.Test: Fehler!\n\
                    Eingabe:              (5, 3, 7, 1, reverse = 1)\n\
                    Erwartete Ausgabe:    (2)\n\
                    Tatsächliche Ausgabe: (%d)\n",result);
            CU_FAIL("2.Test");
          }
        
          //Testcase random
          int c[6] = {9, 1, 11, 9, 10, 14};
          result = recSort(c, c+5, 0);
          if(result == 11){
            CU_PASS("Erfolg! Eingabe (9, 1, 11, 9, 10, 14, reverse = 0) Erwartete Ausgabe (11)");
          }
          else{
            printf("\n    3.Test: Fehler!\n\
                    Eingabe:              (9, 1, 11, 9, 10, 14, reverse = 0)\n\
                    Erwartete Ausgabe:    (11)\n\
                    Tatsächliche Ausgabe: (%d)\n",result);
            CU_FAIL("3.Test");
          }
        
          //Testcase Feld ist schon sortiert
          int d[5] = {5, 4, 3, 2, 1};
          result = recSort(d, d+4, 1);
          if(result == 0){
            CU_PASS("Erfolg! Eingabe (5, 4, 3, 2, 1, reverse = 1) Erwartete Ausgabe (0)");
          }
          else{
            printf("\n    4.Test: Fehler!\n\
                    Eingabe:              (5, 4, 3, 2, 1, reverse = 1)\n\
                    Erwartete Ausgabe:    (0)\n\
                    Tatsächliche Ausgabe: (%d)\n",result);
            CU_FAIL("4.Test");
          }
        
          //Testcase Feld ist leer
          result = recSort(a, a, 0);
          if(result == 0){
            CU_PASS("Erfolg! Eingabe ([], reverse = 0) Erwartete Ausgabe (0)");
          }
          else{
            printf("\n    5.Test: Fehler!\n\
                    Eingabe:              ([], reverse = 0)\n\
                    Erwartete Ausgabe:    (0)\n\
                    Tatsächliche Ausgabe: (%d)\n",result);
            CU_FAIL("5.Test");
          }
        }

        
