shortname: "Permutationsmatrix" #E22
title: "Permutationsmatrix erkennen"
taskid: 76
defaultEditorInput: |
lang: "c"
task: |
  Eine Permutationsmatrix ist eine quadratische, ganzzahlige Matrix, die in jeder Zeile und jeder Spalte genau einen Eintrag 1 und sonst nur 0-Einträge hat. Programmieren Sie eine Funktion
  ```
  int permatcheck(const int** p, int laenge)
  ```
  die von einer `laenge` x `laenge` Matrix testet, ob es sich um eine Permutationsmatrix handelt. Geben Sie `1` zurück, falls ja, und `0` sonst.

  Die Matrix soll in Doppelzeigerform übergeben werden. Als Verwendungsbeispiel für diese Form von Matrizen können Sie ihre Funktion mit folgender `main`-Funktion testen:
  ```c
  #include<stdio.h>
  #define N 2
  
  int main() {
    int inhalt[N*N] = {1,0,0,1};
    int *matrix[N];
    matrix[0] = &inhalt[0];
    matrix[1] = &inhalt[N];
    printf("%d\n",permatcheck((const int**)matrix,N));
  }
  ```
solution: |
  int permatcheck(const int** p, int laenge) {
    int zcounter = 0;
    int scounter = 0;
    for (int i=0; i<laenge; i++) {
      zcounter = 0;
      scounter = 0;
      for (int j=0; j<laenge; j++) {
        if (p[i][j] == 1) 
          zcounter++;
        if (p[j][i] == 1)
          scounter++;
      }
      if (scounter != 1 || zcounter != 1)
        return 0;
    }
    return 1;
  }

