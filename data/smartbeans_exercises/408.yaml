        #include <CUnit/CUnit.h>
        #include <string.h>
        #include "CUnit/Basic.h"
        #include "solution.c"
        
        void test_levenshtein(void){
          int l;
          
          //Testcase Beispiel
          l = levenshtein("Tier", "Tor");
          if(l == 2){
            CU_PASS("Erfolg! Eingabe ("Tier", "Tor") Erwartete Ausgabe (2)");
          }
          else{
            printf("\n    1.Test: Fehler!\n\
                    Eingabe:              (\"Tier\", \"Tor\")\n\
                    Erwartete Ausgabe:    (2)\n\
                    Tatsächliche Ausgabe: (%d)\n",l);
            CU_FAIL("1.Test");
          }

          //Testcase leerer String
          l = levenshtein("", "");
          if(l == 0){
            CU_PASS("Erfolg! Eingabe ("", "") Erwartete Ausgabe (0)");
          }
          else{
            printf("\n    2.Test: Fehler!\n\
                    Eingabe:              (\"\", \"\")\n\
                    Erwartete Ausgabe:    (0)\n\
                    Tatsächliche Ausgabe: (%d)\n",l);
            CU_FAIL("2.Test");
          }
          
          //Testcase m > n
          l = levenshtein("Hut", "Mutter");
          if(l == 4){
            CU_PASS("Erfolg! Eingabe ("Hut", "Mutter") Erwartete Ausgabe (4)");
          }
          else{
            printf("\n    3.Test: Fehler!\n\
                    Eingabe:              (\"Hut\", \"Mutter\")\n\
                    Erwartete Ausgabe:    (4)\n\
                    Tatsächliche Ausgabe: (%d)\n",l);
            CU_FAIL("3.Test");
          }
          
          //Testcase Groß- und Kleinschreibung
          l = levenshtein("Gut","gut");
          if(l == 1){
            CU_PASS("Erfolg! Eingabe ("Gut","gut") Erwartete Ausgabe (1)");
          }
          else{
            printf("\n    4.Test: Fehler!\n\
                    Eingabe:              (\"Gut\",\"gut\")\n\
                    Erwartete Ausgabe:    (1)\n\
                    Tatsächliche Ausgabe: (%d)\n",l);
            CU_FAIL("4.Test");
          }
          
          //Testcase Sonderzeichen
          l = levenshtein("Hello world!", "Hello? world?");
          if(l == 2){
            CU_PASS("Erfolg! Eingabe ("Hello world!", "Hello? world?") Erwartete Ausgabe (2)");
          }
          else{
            printf("\n    5.Test: Fehler!\n\
                    Eingabe:              (\"Hello world!\", \"Hello? world?\")\n\
                    Erwartete Ausgabe:    (2)\n\
                    Tatsächliche Ausgabe: (%d)\n",l);
            CU_FAIL("5.Test");
          }
          
          //Testcase random
          l = levenshtein("Rv74K","csqJ7");
          if(l == 5){
            CU_PASS("Erfolg! Eingabe ("Rv74K","csqJ7") Erwartete Ausgabe (5)");
          }
          else{
            printf("\n    6.Test: Fehler!\n\
                    Eingabe:              (\"Rv74K\",\"csqJ7\")\n\
                    Erwartete Ausgabe:    (5)\n\
                    Tatsächliche Ausgabe: (%d)\n",l);
            CU_FAIL("6.Test");
          }
        }
        
          
