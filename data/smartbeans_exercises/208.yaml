                    Tatsächliche Ausgabe: (%d)\n", test_num, arr_formated, length, input1, exp, act);
        }

        void test(void){
          int array[] = {100,80,60,50,44,20,10};
          int b[] = {1};
          int len = sizeof(array) / sizeof(int);
          int result = suche(array, len, 0);
          if(result == 0){
            CU_PASS("Erfolg!");
          } else {
            CU_FAIL("1.Test");
            showFailMessage(array, len, 0, 0, result, 1);
          }

          //printf("suche: %d\n", suche(array, len, 0));
          
          if(suche(array, len, 50) == 1){
            CU_PASS("Erfolg!");
          } else {
            CU_FAIL("2.Test");
            showFailMessage(array, len, 50, 1, suche(array, len, 50), 2);
          }
          
          if(suche(array, len, 100) == 1){
            CU_PASS("Erfolg!");
          } else {
            CU_FAIL("3.Test");
            showFailMessage(array, len, 100, 1, suche(array, len, 100), 3);
          }
          
          if(suche(array, len, 10) == 1){
            CU_PASS("Erfolg!");
          } else {
            CU_FAIL("4.Test");
            showFailMessage(array, len, 10, 1, suche(array, len, 10), 4);
          }
          if(suche(b, 1, 1) == 1){
            CU_PASS("Erfolg!");
          } else {
            CU_FAIL("5.Test");
            showFailMessage(b, 1, 1, 1, suche(b, 1, 1), 5);
          }
          if(suche(b, 1, 0) == 0){
            CU_PASS("Erfolg!");
          } else {
            CU_FAIL("6.Test");
            showFailMessage(b, 1, 0, 0, suche(b, 1, 0), 6);
          }
        }
