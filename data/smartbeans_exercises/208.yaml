            if(j < length -1){
              sprintf(arr_formated, "%s, ", arr_formated);
            }
          }
          sprintf(arr_formated, "%s}", arr_formated);
          printf("\n    %d.Test: Fehler!\n\
                    Eingabe:              (suche(%s, %d, %d));\n\
