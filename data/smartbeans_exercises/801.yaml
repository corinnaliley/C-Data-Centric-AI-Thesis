shortname: "Zahlen ausgeben aufsteigend" #L1
title: "Zahlen von 1 bis n aufsteigend ausgeben"
taskid: 801
defaultEditorInput: |
solution: |
  #include<stdio.h>

  int main() {
    int n;
    scanf("%d", &n);
    for(int i=0; i<n; i++)
      printf("%d\t", i+1);
    return 0;
  }
lang: "c"
task: |
  Schreiben Sie in Programm, dass eine Zahl `n` einließt und alle Zahlen von `1` bis `n` ausgibt, getrennt von Leerzeichen.

  ### Beispieleingabe
  ```
  3
  ```
  ### Beispielausgabe
  ```
  1 2 3
  ```
tests: 
