shortname: "Multiplikationstafel"
title: "Formatierte Ausgabe von Zahlenwerten"
taskid: 59
defaultEditorInput: |
solution: |
  #include<stdio.h>
  int main() {
    for(int i=0; i<5; i++) {
      for(int j=0; j<5; j++) {
        printf("%3d", (i+1)*(j+1));
      }
      printf("\n");
    }
  }
lang: "c"
task: |
  Lassen Sie sich eine `5x5` Multiplikationstafel ausgeben:
  ```
    1  2  3  4  5
    2  4  6  8 10
    3  6  9 12 15
    4  8 12 16 20
    5 10 15 20 25
  ```
  Achten Sie bei der formatierten Ausgabe darauf, dass die Zahlen wie im Beispiel eingerückt werden.
  
