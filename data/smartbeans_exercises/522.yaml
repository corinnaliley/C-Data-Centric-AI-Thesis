        #include <CUnit/CUnit.h>
        #include "CUnit/Basic.h"
        #include "solution.c"

        int flag = 0;

        void showFailMessage(int test_num, int *array, int length, int input2, char *exp, int exp_pos, int act, int *act_pos){
          if(flag == 0){
            printf("\n\nIn den Tests werden nur das Feld und der gesuchte Wert mit denen die Funktion aufgerufen wird angegeben. Sie können davon ausgehen, dass die übergebenen Pointer richtig sind.\n");            
          }
          char  array_string[5000];
          if(array == NULL){
            sprintf(array_string, "NULL");
          } else {
            sprintf(array_string, "{");
            for(int j = 0; j < length; j++){
              sprintf(array_string, "%s%d", array_string, array[j]);
              if(j < length-1){
                sprintf(array_string, "%s, ", array_string);
              }
            }
            sprintf(array_string, "%s}", array_string);
          }
          char exp_string[5000];
          if(exp_pos == -1){
            sprintf(exp_string, "NULL");
          } else {
            sprintf(exp_string, "start + %d", exp_pos);
          }

          char act_string[5000];
          if(act_pos == NULL){
            sprintf(act_string, "NULL");
          } else {
            sprintf(act_string, "start + %ld", act_pos-array);
          }
          printf("\n    %d.Test: Fehler!\n\
                    Eingabe:              (Feld = %s,\n\
                                           x = %d,\n\
                    Erwartete Ausgabe:    (%s und pos == %s)\n\
                    Tatsächliche Ausgabe: (%d und pos == %s)\n", test_num, array_string, input2, exp, exp_string, act, act_string);
          flag = 1;
        }


        void test(void){
          
          int array[] = {1, 2, 4, 4, 6, 7, 10, 20, 55, 69, 70, 71, 72};
          int b[] = {-6};
          int c[] = {};
          int *pos;
          if(rec_contains(&pos, array, array + 13, 0) == 0 && pos == NULL){
            CU_PASS("Erfolg!");
          } else{
            CU_FAIL("1.Test");
            showFailMessage(1, array, 13, 0, "0", -1, rec_contains(&pos, array, array + 13, 0), pos);
          }

          if(rec_contains(&pos, array, array + 13, 73) == 0 && pos == NULL){
            CU_PASS("Erfolg!");
          } else{
            CU_FAIL("2.Test");
            showFailMessage(2, array, 13, 73, "0", -1, rec_contains(&pos, array, array + 13, 0), pos);
          }
          int result = rec_contains(&pos, array, array + 13, 1);
          if(result > 0 && pos == array){
            CU_PASS("Erfolg!");
          } else{
            CU_FAIL("3.Test");
            showFailMessage(3, array, 13, 1, "> 0", 0, result, pos);
          }

          result = rec_contains(&pos, array, array + 13, 10);
          if(result > 0 && pos == array + 6){
            CU_PASS("Erfolg!");
          } else{
            CU_FAIL("4.Test");
            showFailMessage(4, array, 13, 1, "> 0", 6, result, pos);
          }

          result = rec_contains(&pos, array, array + 13, 72);
          if( result > 0 && pos == array + 12){
            CU_PASS("Erfolg!");
          } else{
            CU_FAIL("5.Test");
            showFailMessage(5, array, 13, 72, "> 0", 12, result, pos);
          }

          result = rec_contains(&pos, b, b + 1, 0);
          if(result == 0 && pos == NULL){
            CU_PASS("Erfolg!");
          } else{
            CU_FAIL("6.Test");
            showFailMessage(6, b, 1, 0, "0", -1, result, pos);
          }

          result = rec_contains(&pos, b, b + 1, -6);
          if(result > 0 && pos == b){
            CU_PASS("Erfolg!");
          } else{
            CU_FAIL("7.Test");
            showFailMessage(7, b, 1, -6, "> 0", 0, result, pos);
          }

          result = rec_contains(&pos, c, c, 1);
          if(result == 0 && pos == NULL){
            CU_PASS("Erfolg!");
          } else{
            CU_FAIL("8.Test");
            showFailMessage(8, c, 0, 1, "0", -1, result, pos);
          }


        }
