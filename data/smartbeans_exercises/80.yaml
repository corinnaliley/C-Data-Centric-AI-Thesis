shortname: "Rekursive Summe" #Z6
title: "Summe rekursiv berechnen"
taskid: 80
defaultEditorInput: |
lang: "c"
task: |
  Schreiben Sie eine rekursive Funktion mit dem Prototypen `int sum(int n);`, die folgende Definition realisiert:
  ```
  sum(n) = 
           0           ,falls n=0
           sum(n-1)+n  ,falls n>0
           sum(n+1)+n  ,falls n<0
  ```
solution: |
  int sum(int n) {
    if (n == 0) {
      return 0;
    }
    if (n > 0) {
      return sum(n - 1) + n;
    }
    if (n < 0) {
      return sum(n + 1) + n;
    }
  }
