shortname: "Geheimbotschaft" #D1
title: "eigene Codesprache entschlüsseln"
taskid: 401
defaultEditorInput: |
lang: "c"
task: |
  Malu und Luca schreiben SMS im Schulunterricht. Sie haben sich beide eine eigene Codesprache überlegt, die sie strikt befolgen.
  Malu versteht nur Nachrichten, in denen jeder zweite Buchstabe groß geschrieben ist, beginnend mit einem Kleinbuchstaben, zum Beispiel:
  
  - `hAlLo MaLu WiE gEhT eS dIr`
  - `hDgDl`
  
  Luca versteht nur Nachrichten, in denen jeder zweite Buchstabe klein geschrieben ist, beginnend mit einem Großbuchstaben, zum Beispiel:
  
  - `HaLlO lUcA wIe GeHt Es DiR`
  - `HdGdL`
  
  Schreiben Sie eine Funktion 
  
  ```
  char* convert_message(const char *message, char receiver)
  ```
  
  Diese nimmt eine Nachricht `message` und einen Empfänger `receiver` (`'M'` oder `'L'`) entgegen, und gibt die Nachricht so codiert zurück, dass der Empfänger sie lesen kann. 

  *Anforderungen*
 
  - Die Nachrichten enthalten nur Buchstaben und Leerzeichen.
  - Die Leerzeichen gelten nicht als Buchstaben und werden für die Zählung übersprungen.
  - Wenn der Empfänger nicht `'M'` oder `'L'` ist, soll die Funktion `Mit dir schreib ich nicht!` zurückgeben.

solution: |
  #include <string.h>
  #include <stdlib.h>
  #include <ctype.h>

  char* convert_message(const char *message, char receiver){
    size_t len = strlen(message)+1;
    char *new_message = malloc(len*sizeof(char));
    int upper;
    if(receiver == 'M') {
      // 0 = lowercase 1 = uppercase
      upper = 0;
    }
    else if (receiver == 'L'){
      upper = 1;
    }
    else{
      return("Mit dir schreib ich nicht!");
    }
    for(int i = 0; i < len; i++){
      if(message[i] == ' '){
        new_message[i] = ' ';
        continue;
      }
      if(upper == 0){
        new_message[i] = tolower(message[i]);
        upper = 1;
      }
      else if(upper == 1){
        new_message[i] = toupper(message[i]);
        upper = 0;
      }
    }
    new_message[len] = '\0';

    return(new_message);
  }
tests:
  - testtype: "c-code"
    testCases:
      - |
        #include <CUnit/CUnit.h>
        #include <string.h>
        #include "CUnit/Basic.h"
        #include "solution.c"

        void test_convert_message(void){
          if(strcmp(convert_message("Hallo Luca", 'L'), "HaLlO lUcA") == 0){
            CU_PASS("Erfolg! Eingabe (Hallo Luca, L) Erwartete Ausgabe (HaLlO lUcA)");
          }
          else{
            printf("\n    1.Test: Fehler!\n\
                    Eingabe:              (Hallo Luca, L)\n\
                    Erwartete Ausgabe:    (HaLlO lUcA)\n\
                    Tatsächliche Ausgabe: (%s)\n",convert_message("Hallo Luca", 'L') );
            CU_FAIL("1.Test");
          }
          
          if(strcmp(convert_message("Hallo Malu", 'M'), "hAlLo MaLu") == 0){
            CU_PASS("Erfolg! Eingabe (Hallo Malu, M) Erwartete Ausgabe (hAlLo MaLu)");
          }
          else{
            printf("\n    2.Test: Fehler!\n\
                    Eingabe:              (Hallo Malu, M)\n\
                    Erwartete Ausgabe:    (hAlLo MaLu)\n\
                    Tatsächliche Ausgabe: (%s)\n",convert_message("Hallo Malu", 'M') );
            CU_FAIL("2.Test");
          }

          if(strcmp(convert_message("Hallo Selma", 'S'), "Mit dir schreib ich nicht!") == 0){
            CU_PASS("Erfolg! Eingabe (Hallo Selma, S) Erwartete Ausgabe (Mit dir schreib ich nicht!)");
          }
          else{
            printf("\n    3.Test: Fehler!\n\
                    Eingabe:              (Hallo Selma, S)\n\
                    Erwartete Ausgabe:    (Mit dir schreib ich nicht!)\n\
                    Tatsächliche Ausgabe: (%s)\n",convert_message("Hallo Selma", 'S') );
            CU_FAIL("3.Test");
          }
          
          if(strcmp(convert_message(" wie fies ", 'L'), " WiE fIeS ") == 0){
            CU_PASS("Erfolg! Eingabe ( wie fies , L) Erwartete Ausgabe ( WiE fIeS )");
          }
          else{
            printf("\n    4.Test: Fehler!\n\
                    Eingabe:              ( wie fies , L)\n\
                    Erwartete Ausgabe:    ( WiE fIeS ) [Leerzeichen!!]\n\
                    Tatsächliche Ausgabe: (%s)\n",convert_message(" wie fies ", 'L') );
            CU_FAIL("4.Test");
          }

          if(strcmp(convert_message(" richtig  fies ", 'M'), " rIcHtIg  FiEs ") == 0){
            CU_PASS("Erfolg! Eingabe ( richtig fies , M) Erwartete Ausgabe ( rIcHtIg FiEs ) [Leerzeichen!!]");
          }
          else{
            printf("\n    5.Test: Fehler!\n\
                    Eingabe:              ( richtig  fies , M)\n\
                    Erwartete Ausgabe:    ( rIcHtIg  FiEs ) [Leerzeichen!!]\n\
                    Tatsächliche Ausgabe: (%s)\n",convert_message(" richtig  fies ", 'M') );
            CU_FAIL("5.Test");
          }

          if(strcmp(convert_message("A", 'M'), "a") == 0){
            CU_PASS("Erfolg! Eingabe (A, M) Erwartete Ausgabe (a)");
          }
          else{
            printf("\n    6.Test: Fehler!\n\
                    Eingabe:              (A, M)\n\
                    Erwartete Ausgabe:    (a)\n\
                    Tatsächliche Ausgabe: (%s)\n",convert_message("A", 'M') );
            CU_FAIL("6.Test");
          }

          if(strcmp(convert_message("A", 'L'), "A") == 0){
            CU_PASS("Erfolg! Eingabe (A, L) Erwartete Ausgabe (A)");
          }
          else{
            printf("\n    7.Test: Fehler!\n\
                    Eingabe:              (A, L)\n\
                    Erwartete Ausgabe:    (A)\n\
                    Tatsächliche Ausgabe: (%s)\n",convert_message("A", 'L') );
            CU_FAIL("7.Test");
          }
        }
        int init_suite1(void){ return 0; }
        int clean_suite1(void){ return 0; }
        void cleanup(){}

        int main(){
          CU_pSuite pSuite = NULL;

          /* initialize the CUnit test registry */
          if (CUE_SUCCESS != CU_initialize_registry())
            return 1;

          /* add a suite to the registry */
          pSuite = CU_add_suite("Suite_1", init_suite1, clean_suite1);
          if (NULL == pSuite) {
            unsigned int cu_result = CU_get_number_of_failure_records();
            CU_cleanup_registry();
            return cu_result;
          }

          /* add the tests to the suite */
          /* NOTE - ORDER IS IMPORTANT - MUST TEST fread() AFTER fprintf() */
          if ((NULL == CU_add_test(pSuite, "Geheimbotschaft", test_convert_message)))
          {
            unsigned int cu_result = CU_get_number_of_failure_records();
            CU_cleanup_registry();
            return cu_result;
          }
          /* Run all tests using the CUnit Basic interface */
          CU_basic_set_mode(CU_BRM_VERBOSE);
          CU_basic_run_tests();
          unsigned int cu_result = CU_get_number_of_failure_records();
          CU_cleanup_registry();
          return cu_result;
        }
