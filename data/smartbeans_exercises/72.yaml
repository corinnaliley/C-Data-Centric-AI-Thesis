shortname: "Datumsberechnung" #S20
title: "Anhand von Datum Tag im Jahr berechnen und umgekehrt"
taskid: 72
defaultEditorInput: |
lang: "c"
task: |
  Schreiben Sie eine Funktion
  ```
  int datum2int(int tag, int monat)
  ```
  die ein Datum in den Tag im Jahr (z.B. der 11.2. ist der 42. Tag im Jahr) und eine Funktion
  ```
  void int2datum(int tage, int* ergebnis)
  ```
  die einen Tag im Jahr in ein Datum umrechnet. `ergebnis` ist ein Feld, in dem der erste Eintrag dem Tag und der zweite Eintrag dem Monat entsprechen soll. Gehen Sie dabei davon aus, dass der Februar immer 28 Tage hat. 
solution: |
  #include<stdio.h>
  #include<stdlib.h>

  int datum2int(int tag, int monat);
  void int2datum(int tage, int* ergebnis);
  /*
  int main(){
    printf("%d\n",datum2int(11,2) );
    int *ergebnis=(int *) calloc(2,sizeof(int));
    int2datum(31, ergebnis);
    printf("%d.%d\n", *ergebnis, *(ergebnis+1) );
    int *ergebnis1=(int *) calloc(2,sizeof(int));
    int2datum(365, ergebnis1);

    printf("%d.%d\n", *ergebnis1, *(ergebnis1+1) );
    free(ergebnis);
    free(ergebnis1);
  }*/


  int datum2int(int tag, int monat){
    int day=tag;
    for(int i=1; i<monat;i++){
      //printf("day: %d \n", day);
      if(i==2){
        day+=28;
      }
      else if((i%2)==0 && i<=7){
        day+=30;
      }
      else if((i%2)==0 && i>7){
        day+=31;
      }
      else if((i%2)==1 && i<=7){
        day+=31;
      }
      else{
        day+=30;
      }
    }
    return day;

  }

  void int2datum(int tage, int* ergebnis){
    int counter=tage;
    int *monthdays = (int *) calloc(13, sizeof(int));
    for(int i=1; i<=12;i++){
      if(i==2){
        monthdays[i]=28;
      }
      else if((i%2)==0 && i<=7){
        monthdays[i]=30;
      }
      else if((i%2)==0 && i>7){
        monthdays[i]=31;
      }
      else if((i%2)==1 && i<=7){
        monthdays[i]=31;
      }
      else{
        monthdays[i]=30;
      }
    }
    for(int i=1; i<=12;i++){
      //printf("counter: %d, monatstage: %d Datum: %d.%d \n", counter,monthdays[i], *(ergebnis+1),*ergebnis);
      if(counter-monthdays[i]<=0){
          *(ergebnis+1)=*(ergebnis+1)+1;
          *ergebnis=counter;
          break;
      }
      counter-=monthdays[i];
      *(ergebnis+1)=*(ergebnis+1)+1;

    }

    free(monthdays);
    return;
  }
