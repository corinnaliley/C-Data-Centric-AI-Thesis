shortname: "Modulo" #N4
title: "Gerade Zahlen bestimmen mit Modulo"
taskid: 504
defaultEditorInput: |
solution: |
  #include <stdio.h>
  
  int main() {
    int n;
    scanf("%d", &n);
    if (n % 2 == 0)
      printf("gerade");
    else
      printf("ungerade");
  }
lang: "c"
task: |
  Schreiben Sie ein Programm, das eine ganze Zahl einliest und ausgibt ob die Zahl 'gerade' oder 'ungerade' ist.
  
  ### Beispieleingabe
  ```
  0
  4
  7
  ```
  ### Beispielausgabe
  ```
  gerade
  gerade
  ungerade
  ```
