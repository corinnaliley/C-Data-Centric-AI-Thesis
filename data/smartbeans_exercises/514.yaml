          } else {
          sprintf(exp_formated, "{");
            for(int j = 0; j < length; j++){
              sprintf(exp_formated, "%s%d", exp_formated, exp[j]);
              if(j < length-1){
                sprintf(exp_formated, "%s, ", exp_formated);
              }
            }
            sprintf(exp_formated, "%s}", exp_formated);
          }

          char act_formated[5000];
          if(act == NULL){
            sprintf(act_formated, "NULL");
          } else {
            sprintf(act_formated, "{");
            for(int j = 0; j < length; j++){
              sprintf(act_formated, "%s%d", act_formated, act[j]);
              if(j < length-1){
                sprintf(act_formated, "%s, ", act_formated);
              }
            }
            sprintf(act_formated, "%s}", act_formated);
          }

          printf("\n    %d.Test: Fehler!\n\
                    Eingabe:              (bucket_sort(%s, %d, %d))\n\
                    Erwartete Ausgabe:    (%s)\n\
                    Tatsächliche Ausgabe: (%s)\n", test_num, input_formated, length, max, exp_formated, act_formated);
        }

        void test1(void){
          // Error case max negativ
          int a[] = {5,3,6,1,5,4,8,9,6,6,6};
          int a_print[] = {5,3,6,1,5,4,8,9,6,6,6};
          int length = 11;
          int max = -3;
          int *result = bucket_sort(a, length, max);
          if(result == NULL){
            CU_PASS("Erfolg!");
          } else{
            CU_FAIL("1.Test");
            showFailMessage(1, a_print, length, max, NULL, result);
          }  

          // Error case values in array are too big
          max = 8;
          result = bucket_sort(a, length, max);
          if(result == NULL){
            CU_PASS("Erfolg!");
          } else{
            CU_FAIL("2.Test");
            showFailMessage(2, a_print, length, max, NULL, result);
          }    
          
          // Positiv Test case random multiple same values
          max = 20;
          result = bucket_sort(a, length, max);
          int correct_result[] = {1,3,4,5,5,6,6,6,6,8,9};
          int flag = 0;
          if(result == NULL){
            CU_FAIL("3.Test");
            showFailMessage(3, a_print, length, max, correct_result, result);
          } else {     
            for(int i = 0; i < length; i++){
              if(correct_result[i] != result[i]){
                CU_FAIL("4.Test");
                showFailMessage(4, a_print, length, max, correct_result, result);
                flag = 1;
                break;
              }
            }
            if(flag == 0){
              CU_PASS("Erfolg!");
            }
          }

          // Positiv Test case random only unique values
          int b[] = {3,7,5,1,2,4,10,9999};
          int b_print[] = {3,7,5,1,2,4,10,9999};
          int correct_result2[] = {1,2,3,4,5,7,10,9999};
          max = 99999;
          length = 8;
          result = bucket_sort(b, length, max);
          if(result == NULL){
            CU_FAIL("5.Test");
            showFailMessage(5, b_print, length, max, correct_result2, result);
          } else {
            flag = 0;
            for(int i = 0; i < length; i++){
              if(correct_result2[i] != result[i]){
                CU_FAIL("6.Test");
                showFailMessage(6, b_print, length, max, correct_result2, result);
                flag = 1;
                break;
              }
            }
            if(flag == 0){
              CU_PASS("Erfolg!");
            }
          }

          // Positiv Test case length 1
          int c[] = {9999};
          int c_print[] = {9999};
          int correct_result3[] = {9999};
          max = 99999;
          length = 1;
          result = bucket_sort(c, length, max);
          if(result == NULL){
            CU_FAIL("7.Test");
            showFailMessage(7, c_print, length, max, correct_result3, result);
          } else {            
            flag = 0;
            for(int i = 0; i < length; i++){
              if(correct_result3[i] != result[i]){
                CU_FAIL("8.Test");
                showFailMessage(8, c_print, length, max, correct_result3, result);
                flag = 1;
                break;
              }
            }
            if(flag == 0){
              CU_PASS("Erfolg!");

            }    
          }    
        }

