                    Tatsächliche Ausgabe: (\"%s\")\n", test_num, input1, input2, exp, act);
        }

        void test_strconcat(void){
          int res = strcmp(strconcat("",""),"");
          if(res == 0){
            CU_PASS("Erfolg!");
          } else {
            CU_FAIL("6.Test");
            showFailMessagestrconcat(6, "","", "", strconcat("",""));
          }

          res = strcmp(strconcat("","test"),"test");
          if(res == 0){
            CU_PASS("Erfolg!");
          } else {
            CU_FAIL("7.Test");
            showFailMessagestrconcat(7, "","test", "test", strconcat("","test"));
          }

          res = strcmp(strconcat("test",""),"test");
          if(res == 0){
            CU_PASS("Erfolg!");
          } else {
            CU_FAIL("8.Test");
            showFailMessagestrconcat(8, "test","", "test", strconcat("test",""));
          }

          res = strcmp(strconcat("Hallo ","Welt"),"Hallo Welt");
          if(res == 0){
            CU_PASS("Erfolg!");
          } else {
            CU_FAIL("9.Test");
            showFailMessagestrconcat(9, "Hallo ","Welt", "Hallo Welt", strconcat("Hallo ","Welt"));
          }

          res = strcmp(strconcat("Weg","beschreibung"),"Wegbeschreibung");
          if(res == 0){
            CU_PASS("Erfolg!");
          } else {
            CU_FAIL("10.Test");
            showFailMessagestrconcat(10, "Weg","beschreibung", "Wegbeschreibung", strconcat("Weg","beschreibung"));
          }
        }

