                    Tatsächliche Ausgabe: (\"%s\")\n", test_num, input1, exp, act);
        }

        void test_strinv(void){
          char Hallo[] = "Hallo";
          char Eisenbahn[] = "Eisenbahn";
          char lagerregal[] = "lagerregal";
          int res = strcmp(strinv(""),"");
          if(res == 0){
            CU_PASS("Erfolg!");
          } else {
            CU_FAIL("1.Test");
            showFailMessagestrinv(1, "", "", strinv(""));
          }

          res = strcmp(strinv(" ")," ");
          if(res == 0){
            CU_PASS("Erfolg!");
          } else {
            CU_FAIL("2.Test");
            showFailMessagestrinv(2, " ", " ", strinv(" "));
          }

          res = strcmp(strinv("Hallo"),"ollaH");
          if(res == 0){
            CU_PASS("Erfolg!");
          } else {
            CU_FAIL("3.Test");
            showFailMessagestrinv(3, "Hallo", "ollaH", strinv("Hallo"));
          }

          res = strcmp(strinv(Eisenbahn),"nhabnesiE");
          if(res == 0){
            CU_PASS("Erfolg!");
          } else {
            CU_FAIL("4.Test");
            showFailMessagestrinv(4, Eisenbahn, "nhabnesiE", strinv(Eisenbahn));
          }

          res = strcmp(strinv(lagerregal),"lagerregal");
          if(res == 0){
            CU_PASS("Erfolg!");
          } else {
            CU_FAIL("5.Test");
            showFailMessagestrinv(5, lagerregal, "lagerregal", strinv(lagerregal));
          }
        }

