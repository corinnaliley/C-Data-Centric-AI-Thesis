shortname: "Methoden für Strings II" #Z7
title: "verschiedene Methoden zur Stringbehandlung"
taskid: 75
defaultEditorInput: |
lang: "c"
task: |
  Realisieren Sie die folgenden Funktionen:
  ```
  char *strinv(const char *s)
  ```
  liefert das Inverse des String `s`, d.h. den String `s` rückwärts gelesen.
  ```
  char *strconcat(const char *s, const char *t)
  ```
  liefert einen String, der eine Vereinigung der Strings `s` und `t` ist, d.h. dem Hintereinanderstellen der Strings `s` und `t` entspricht.
solution: |
  #include <stdlib.h>
  #include <stdio.h>
  #include <string.h>

  char *strinv(const char *s) {
      long laenge = strlen(s);
      char *ergebnis = (char*) malloc((laenge+1)*sizeof(char));
      for(int i = (laenge-1); i >= 0; i--) {
          *ergebnis = *(s+i);
          ergebnis++;
      }
      *ergebnis = '\0';

      return (ergebnis-laenge);
  }

  char *strconcat(const char *s, const char *t) {
      long laenge = strlen(s) + strlen(t);
      char* ergebnis = (char*) malloc((laenge+1)*sizeof(char));
      while(*s != '\0') {
          *ergebnis = *s;
          ergebnis++;
          s++;
      }
      while(*t != '\0') {
          *ergebnis = *t;
          ergebnis++;
          t++;
      }
      *ergebnis = '\0';

      return (ergebnis-laenge) ;
  }
