shortname: "Quadratprogramm" #L4
title: "Berechnung von Quadratzahlen in der main-Methode"
taskid: 804
defaultEditorInput: |
solution: |
  #include<stdio.h>
 
  int main() {
    int n;
    scanf("%d", &n);
    printf("%d\n", n*n);
    return 0;
  }
lang: "c"
task: |
  Schreiben Sie ein Programm, dass eine ganze Zahl `n` einließt und ihr Quadrat ausgibt.
 
  ### Beispieleingabe
  ```
  5
  ```
  ### Beispielausgabe
  ```
  25
  ```
